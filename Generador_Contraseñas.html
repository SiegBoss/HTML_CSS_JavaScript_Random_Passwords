<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassGen Pro | Seguridad Minimalista</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
</head>

<body>
    <main class="app-container">
        <header>
            <h1>PassGen <span>Pro</span></h1>
            <p>Generación de claves con cifrado visual</p>
        </header>

        <section class="display-section">
            <div class="input-wrapper">
                <input type="text" id="result" readonly placeholder="Contraseña generada">
                <button id="copy-btn" title="Copiar contraseña">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
            </div>
            <div class="strength-meter" id="strength-meter"></div>
        </section>

        <section class="controls-section">
            <div class="setting-group">
                <div class="label-row">
                    <label>Longitud</label>
                    <span id="length-val">16</span>
                </div>
                <input type="range" id="length" min="8" max="50" value="16">
            </div>

            <div class="grid-options">
                <label class="option-card">
                    <input type="checkbox" id="uppercase" checked>
                    <span class="custom-check"></span>
                    <span class="label-text">ABC</span>
                </label>
                <label class="option-card">
                    <input type="checkbox" id="lowercase" checked>
                    <span class="custom-check"></span>
                    <span class="label-text">abc</span>
                </label>
                <label class="option-card">
                    <input type="checkbox" id="numbers" checked>
                    <span class="custom-check"></span>
                    <span class="label-text">123</span>
                </label>
                <label class="option-card">
                    <input type="checkbox" id="symbols" checked>
                    <span class="custom-check"></span>
                    <span class="label-text">@#$%</span>
                </label>
            </div>

            <div class="word-input-group">
                <label for="baseword">Palabra Semilla (Opcional)</label>
                <input type="text" id="baseword" placeholder="Ej: miLlaveSegura">
            </div>

            <button id="generate-btn" class="main-button">Generar nueva clave</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
